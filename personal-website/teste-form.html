<!DOCTYPE html>
<html>
<head>
    <title>Teste Formulário</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin: 15px 0; }
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #ccc; 
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4A90A4;
            box-shadow: 0 0 5px #4A90A4;
        }
        button { 
            background: #4A90A4; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #3a7a8a; }
        .success { 
            background: #d4edda; 
            color: #155724; 
            padding: 15px; 
            border-radius: 5px; 
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 TESTE DE FORMULÁRIO SIMPLES</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>Nome:</label>
            <input type="text" placeholder="Digite seu nome">
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="text" placeholder="Digite seu email">
        </div>
        
        <div class="form-group">
            <label>Telefone:</label>
            <input type="tel" placeholder="Digite seu telefone">
        </div>
        
        <div class="form-group">
            <label>Data:</label>
            <input type="date">
        </div>
        
        <div class="form-group">
            <label>Horário:</label>
            <select>
                <option value="">Selecione</option>
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Noite">Noite</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Mensagem:</label>
            <textarea placeholder="Digite sua mensagem"></textarea>
        </div>
        
        <button type="submit">📅 Enviar Teste</button>
    </form>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                nome: this.querySelector('input[placeholder="Digite seu nome"]').value,
                email: this.querySelector('input[placeholder="Digite seu email"]').value,
                telefone: this.querySelector('input[placeholder="Digite seu telefone"]').value,
                data: this.querySelector('input[type="date"]').value,
                horario: this.querySelector('select').value,
                mensagem: this.querySelector('textarea').value
            };
            
            document.getElementById('result').innerHTML = 
                '<div class="success"><strong>✅ Formulário Funcionou!</strong><br><pre>' + 
                JSON.stringify(data, null, 2) + '</pre></div>';
        });
    </script>
</body>
</html>
